version: "3.9"

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api1
      - api2
      - api3

  api1:
    build: .
    environment:
      PORT: "8081"
      INSTANCE: "api-1"
      DATABASE_URL: "postgres://postgres:admin@db:5432/postgres?sslmode=disable"
    depends_on:
      db:
        condition: service_started

  api2:
    build: .
    environment:
      PORT: "8081"
      INSTANCE: "api-2"
      DATABASE_URL: "postgres://postgres:admin@db:5432/postgres?sslmode=disable"
    depends_on:
      db:
        condition: service_started

  api3:
    build: .
    environment:
      PORT: "8081"
      INSTANCE: "api-3"
      DATABASE_URL: "postgres://postgres:admin@db:5432/postgres?sslmode=disable"
    depends_on:
      db:
        condition: service_started

  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "admin"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
